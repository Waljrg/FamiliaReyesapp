<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fe, Tradición y Honor</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap">
    <style>
        :root {
            --color-purpura-base: #5a0078;   
            --color-purpura-oscuro: #1a0026; 
            --color-oro: #D4AF37; 
            --gradiente-oro: linear-gradient(145deg, #BF953F, #FCF6BA, #B38728, #AA771C);
            --fuente-principal: 'Playfair Display', serif;
            --fuente-secundaria: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--fuente-secundaria);
            background-color: var(--color-purpura-oscuro);
            background-image: radial-gradient(circle at center, rgba(120, 0, 160, 0.2) 0%, rgba(26, 0, 38, 1) 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* Contenedor del Login */
        .login-card {
            width: 90%;
            max-width: 400px;
            padding: 40px;
            background: rgba(40, 0, 60, 0.6);
            border: 1px solid #BF953F;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 15px rgba(212, 175, 55, 0.2);
            text-align: center;
        }

        .login-card h2 {
            font-family: var(--fuente-principal);
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #f7e8ad, #b8860b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--color-oro);
            margin-bottom: 30px;
            display: block;
        }

        /* Estilos de los Inputs */
        .input-group {
            position: relative;
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 8px;
            color: #f7e8ad;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 4px;
            color: white;
            font-family: var(--fuente-secundaria);
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--color-oro);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
        }

        /* Botón estilo Oro (Copiado de tu diseño) */
        .btn-login {
            width: 100%;
            position: relative;
            padding: 14px;
            margin-top: 10px;
            font-family: var(--fuente-principal);
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            color: #1a0026;
            background: var(--gradiente-oro);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: 0.3s;
            overflow: hidden;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        /* Efecto de brillo diagonal */
        .btn-login::before {
            content: '';
            position: absolute;
            top: -50%; left: -150%;
            width: 80%; height: 200%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(30deg);
            animation: luzDiagonal 4s infinite;
        }

        @keyframes luzDiagonal {
            0% { left: -150%; }
            30% { left: 150%; }
            100% { left: 150%; }
        }

        .footer-links {
            margin-top: 25px;
            font-size: 0.8rem;
        }

        .footer-links a {
            color: var(--color-oro);
            text-decoration: none;
            transition: 0.3s;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        /* Línea decorativa */
        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, #BF953F, transparent);
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Acceso</h2>
        <span class="subtitle">Fe, Tradición y Honor</span>
        
        <div class="divider"></div>

        <form id="loginForm">
            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <div class="footer-links">
            <p>¿No tienes cuenta? <a href="#">Solicitar acceso</a></p>
            <p style="margin-top: 10px;"><a href="#">¿Olvidaste tu contraseña?</a></p>
        </div>
    </div>
<script type="module" src="src/js/main.js"></script>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            // Aquí iría tu lógica de autenticación
            alert('Intentando conectar con: ' + email);
        });
    </script>
</body>
</html>
